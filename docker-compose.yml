services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      # Host port 5434 (host:container) — 5432 is taken by another Factory build's
      # postgres on this workstation. Container-internal port stays 5432 so the
      # backend's DATABASE_URL=postgresql://...@db:5432/... is unchanged.
      - "5434:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@db:5432/appdb
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:4000
    environment:
      BACKEND_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3002:3000"
    depends_on:
      - backend
